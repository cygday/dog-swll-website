<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Search Results - K9 Pet Zone</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #search-status {
            text-align: center;
            padding: 20px;
            font-size: 18px;
        }
        .dog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 20px auto;
        }
        .dog-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .dog-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo"><a href="index.html"><h2>🐾 k9 pet zone</h2></a></div>
            <ul>
                <li><a href="index.html">Back to Home</a></li>
            </ul>
        </nav>

    <title>Search Results - K9Pawss</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>canine paws search</h1>
        <a href="index.html">Back to Home</a>

    </header>

    <main>
        <div id="search-status"></div>
        <div id="search-results" class="dog-grid">
            <!-- JavaScript will insert results here -->
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
